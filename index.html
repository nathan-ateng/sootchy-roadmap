<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sootchy Roadmap Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B4F8A;--green:#1A7A4A;--amber:#B45309;--red:#C62828;--purple:#6A1B9A;
  --bg:#F0F2F5;--surface:#fff;--border:#DDE2EA;--text:#1A1A1A;--mid:#555;--light:#888;
  --col-w:120px;--label-w:165px;--pill-h:26px;--r:11px;
  --font:'Inter','Segoe UI',Arial,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--blue);color:#fff;padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-l{display:flex;align-items:center;gap:9px}
.logo{font-weight:800;font-size:15px;letter-spacing:-.3px}
.rm-select{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;font-family:var(--font)}
.rm-select option{background:#1B4F8A}
.topbar-r{display:flex;gap:7px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-neutral{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:3px 8px;font-size:11px}
.dl-item{padding:9px 14px;font-size:12px;color:#1A1A1A;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
.dl-item:hover{background:#F0F2F5}
.vt{display:flex;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden}
.vt button{padding:4px 11px;font-size:11px;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;border:none;background:transparent;font-family:var(--font)}
.vt button.on{background:rgba(255,255,255,.3);color:#fff}
.layout{display:flex;flex:1;height:calc(100vh - 48px)}
.sidebar{width:290px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto}
.main{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:0}
.sb-sec{border-bottom:1px solid var(--border)}
.sb-hd{padding:8px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--light);background:#FAFBFC;display:flex;align-items:center;justify-content:space-between}
.meta-fields{padding:9px 13px;display:flex;flex-direction:column;gap:6px}
.fl{display:flex;flex-direction:column;gap:2px}
.fl label{font-size:10px;font-weight:600;color:var(--mid)}
.fl input,.fl select{padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;background:#fff}
.fl input:focus,.fl select:focus{border-color:var(--blue)}
.col-list,.lane-list{padding:7px 13px 10px;display:flex;flex-direction:column;gap:5px}
.col-row{display:flex;align-items:center;gap:4px}
.col-row input[type=text]{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:var(--font);color:var(--text)}
.col-row input[type=color]{width:24px;height:22px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px;flex-shrink:0}
.del{background:none;border:none;cursor:pointer;color:var(--light);font-size:14px;padding:2px 3px;border-radius:3px;line-height:1}
.del:hover{color:var(--red);background:#fff0f0}
.lane-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:2px}
.lane-hd{display:flex;align-items:center;gap:5px;padding:6px 8px;background:#FAFBFC}
.lane-hd input{flex:1;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--text);font-family:var(--font);outline:none}
.lane-desc-inp{display:block;width:100%;padding:3px 8px 5px;border:none;border-top:1px solid var(--border);font-size:11px;color:var(--mid);font-family:var(--font);outline:none}
.lane-items{padding:5px 8px 7px;display:flex;flex-direction:column;gap:6px}
.item-card{border:1px solid var(--border);border-radius:6px;padding:7px 8px;background:#FAFBFC;display:flex;flex-direction:column;gap:4px}
.item-card-top{display:flex;align-items:center;gap:4px}
.item-card-top input[type=text]{flex:1;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:var(--font);color:var(--text);background:#fff}
.item-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.item-row label{font-size:10px;color:var(--mid);white-space:nowrap;min-width:36px}
.item-row input[type=date]{padding:3px 4px;border:1px solid var(--border);border-radius:5px;font-size:10.5px;font-family:var(--font);color:var(--text);background:#fff;flex:1;min-width:0}
.item-row input[type=text]{flex:1;padding:3px 5px;border:1px solid var(--border);border-radius:5px;font-size:10.5px;font-family:var(--font);color:var(--text);background:#fff}
.item-row select{padding:3px 4px;border:1px solid var(--border);border-radius:5px;font-size:10.5px;font-family:var(--font);color:var(--text);background:#fff}
/* blocker list in sidebar */
.blocker-list{display:flex;flex-direction:column;gap:3px;margin-top:2px}
.blocker-row{display:flex;gap:3px;align-items:center}
.blocker-row input{flex:1;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10.5px;font-family:var(--font);background:#fff;color:var(--text)}
.add-blocker{font-size:10px;color:var(--red);cursor:pointer;background:none;border:none;padding:1px 0;font-family:var(--font);text-align:left}
.add-item{display:flex;align-items:center;justify-content:center;gap:3px;padding:4px;border:1px dashed #93b8e0;border-radius:5px;font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;margin-top:1px;background:transparent}
.add-item:hover{background:#EBF4FF}

/* CANVAS */
.c-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.c-title{font-size:21px;font-weight:800;color:var(--blue);letter-spacing:-.4px}
.c-sub{font-size:12px;color:var(--mid);margin-top:1px}
.c-meta{font-size:11px;color:var(--light);text-align:right;line-height:1.8}
.c-meta strong{color:var(--mid)}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:12px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;align-items:center}
.leg-group{display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center}
.leg-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
.leg-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--light)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mid)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* GRID */
.grid-wrap{border-radius:10px;border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.grid-scroll{overflow-x:auto}
.grid{display:grid}
.qh-spacer{background:#FAFBFC;border-bottom:1px solid var(--border);height:40px}
.qh-cell{height:40px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;border-bottom:1px solid var(--border);border-left:1px solid rgba(255,255,255,.2)}
.ll-cell{padding:10px 9px 10px 13px;border-bottom:1px solid var(--border);border-right:2px solid var(--border);display:flex;flex-direction:column;justify-content:flex-start}
.ll-name{font-size:11.5px;font-weight:700;color:var(--text)}
.ll-desc{font-size:10px;color:var(--light);margin-top:2px;line-height:1.3}
.dc-cell{border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:5px 5px;min-height:54px;display:flex;flex-direction:column;gap:2px;align-items:flex-start;position:relative;vertical-align:top;overflow:visible}
.re .ll-cell,.re .dc-cell{background:#fff}
.ro .ll-cell,.ro .dc-cell{background:#F6F8FB}

/* PILL */
.pill-wrap{display:inline-flex;flex-direction:column;gap:0;margin-bottom:3px;max-width:100%;position:relative;z-index:2}
.pill{display:inline-flex;align-items:center;height:var(--pill-h);padding:0 7px;border-radius:var(--r);font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .15s;gap:4px;position:relative}
.pill:hover{filter:brightness(1.12)}
.pill-label{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.pill-avatar{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0;border:1px solid rgba(255,255,255,.5)}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.5)}
.pill-dates{font-size:9px;color:var(--light);padding-left:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;display:block}

/* status badge inside pill */
.sbadge{display:inline-flex;align-items:center;height:13px;padding:0 4px;border-radius:3px;font-size:8.5px;font-weight:800;letter-spacing:.3px;flex-shrink:0}

/* TODAY LINE */
.today-line{position:absolute;width:2px;background:var(--red);z-index:8;pointer-events:none;top:40px;bottom:0}
.today-line::before{content:attr(data-l);position:absolute;top:-14px;left:3px;font-size:9px;font-weight:700;color:var(--red);white-space:nowrap}

/* TOOLTIP */
.tt{position:fixed;background:#1A1A1A;color:#fff;padding:8px 11px;border-radius:8px;font-size:11px;line-height:1.6;z-index:999;pointer-events:none;max-width:240px;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:0;transition:opacity .15s}
.tt.show{opacity:1}
.tt-title{font-weight:700;font-size:12px;margin-bottom:3px}
.tt-row{display:flex;gap:6px;color:rgba(255,255,255,.75);font-size:10.5px}
.tt-row strong{color:#fff}

/* DETAIL PANEL */
.detail-panel{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0;overflow:hidden}
.detail-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:#FAFBFC}
.detail-panel-hd h3{font-size:13px;font-weight:700}
.detail-panel-body{padding:12px 16px;display:flex;flex-wrap:wrap;gap:16px}
.detail-col{flex:1;min-width:180px;display:flex;flex-direction:column;gap:8px}
.detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--light);margin-bottom:2px}
.blocker-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#FFF5F5;border:1px solid #FFCDD2;border-radius:6px}
.blocker-icon{color:var(--red);font-size:14px;flex-shrink:0;line-height:1.4}
.blocker-text{font-size:12px;color:var(--text);line-height:1.5}
.no-blockers{font-size:12px;color:var(--light);font-style:italic}
.detail-assignee{display:flex;align-items:center;gap:7px}
.detail-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.detail-info{font-size:12px;color:var(--text)}
.detail-sub{font-size:10px;color:var(--light)}
.detail-badge{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:10px;font-size:11px;font-weight:700}
.footnote{margin-top:11px;text-align:center;font-size:11px;color:var(--light)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:12px;padding:22px;min-width:300px;max-width:380px;border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:6px}
.modal p{font-size:12px;color:var(--mid);margin-bottom:12px}
.modal input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);margin-bottom:14px;outline:none}
.modal input:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:16px;right:16px;background:var(--green);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.empty{padding:60px 20px;text-align:center;color:var(--light);font-size:13px}
.collapse-btn{background:none;border:none;cursor:pointer;padding:2px 5px;color:var(--mid);font-size:11px;line-height:1;border-radius:3px;margin-left:auto;flex-shrink:0;opacity:.7;transition:opacity .15s}
.collapse-btn:hover{opacity:1;background:var(--hover)}
.sb-hd{display:flex;align-items:center;gap:6px}

/* ── AUTH ── */
.auth-overlay{position:fixed;inset:0;background:#F0F2F5;display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-card{background:#fff;border:1px solid #DDE2EA;border-radius:16px;padding:40px 44px;width:360px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-logo{font-size:26px;font-weight:800;color:#1B4F8A;letter-spacing:-.5px}
.auth-title{font-size:16px;font-weight:700;color:#1A1A1A;text-align:center;margin-top:-6px}
.auth-sub{font-size:12px;color:#555;text-align:center;line-height:1.6;margin-top:-10px}
.auth-google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px 20px;background:#fff;border:1px solid #DDE2EA;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter','Segoe UI',Arial,sans-serif;color:#1A1A1A;transition:box-shadow .15s}
.auth-google-btn:hover{box-shadow:0 2px 10px rgba(0,0,0,.12)}
.auth-google-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{width:100%;padding:8px 12px;background:#FFF5F5;border:1px solid #FFCDD2;border-radius:6px;font-size:12px;color:#C62828;text-align:center;display:none}
.auth-msg{font-size:12px;color:#555;text-align:center;display:none}
.auth-hint{font-size:11px;color:#888;text-align:center;margin-top:-8px}
/* USER BADGE */
.user-badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px 3px 4px}
.user-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.user-nm{font-size:11px;font-weight:600;color:#fff;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ACTIVITY */
.act-panel{margin-top:14px;background:#fff;border:1px solid #DDE2EA;border-radius:10px;overflow:hidden}
.act-hd{padding:9px 14px;border-bottom:1px solid #DDE2EA;background:#FAFBFC;font-size:12px;font-weight:700;color:#555}
.act-list{max-height:180px;overflow-y:auto}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid #DDE2EA;font-size:11px}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.act-body{flex:1;line-height:1.5}
.act-who{font-weight:700;color:#1A1A1A}
.act-what{color:#555}
.act-when{font-size:10px;color:#888;margin-top:1px}
.act-empty{padding:14px;text-align:center;font-size:11px;color:#888;font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-l">
    <span class="logo">Sootchy</span>
    <select class="rm-select" id="rm-sel" onchange="switchRoadmap(this.value)"></select>
    <button class="btn btn-ghost btn-sm" onclick="showNewModal()">+ New</button>
    <button class="btn btn-sm" id="del-rm-btn" onclick="deleteRoadmap()" style="background:rgba(198,40,40,.75);color:#fff;display:none">🗑 Delete</button>
  </div>
  <div class="topbar-r">
    <div class="vt">
      <button id="vt-q" class="on" onclick="setView('q')">Quarterly</button>
      <button id="vt-m" onclick="setView('m')">Monthly</button>
    </div>
    <div id="user-badge-wrap" style="display:none">
      <div class="user-badge">
        <div class="user-av" id="user-av"></div>
        <span class="user-nm" id="user-nm"></span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="signout-btn" style="display:none" onclick="authSignOut()">Sign out</button>
    <div class="dl-wrap" style="position:relative">
      <button class="btn btn-ghost btn-sm" onclick="toggleDlMenu()" id="dl-btn">⬇ Download ▾</button>
      <div id="dl-menu" style="display:none;position:absolute;top:32px;right:0;background:#fff;border:1px solid #DDE2EA;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.15);z-index:200;min-width:160px;overflow:hidden">
        <div class="dl-item" onclick="downloadPNG()">📷 PNG Image</div>
        <div class="dl-item" onclick="downloadPDF()">📄 PDF Document</div>
        <div class="dl-item" onclick="downloadSVG()">🎨 SVG Vector</div>
        <div class="dl-item" onclick="exportData()">📦 JSON Data</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="importData()">⬆ Upload JSON</button>
    <button class="btn btn-ghost btn-sm" onclick="openLogs()">📋 Logs</button>
  </div>
</div>

<!-- AUTH OVERLAY -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">Sootchy</div>
    <div class="auth-title">Roadmap Editor</div>
    <div class="auth-sub">Sign in with your @sootchy.com Google account to continue.</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-msg" id="auth-msg">Signing you in...</div>
    <button class="auth-google-btn" id="auth-btn" onclick="authSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <div class="auth-hint">Access restricted to @sootchy.com accounts</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"><div class="empty">Select or create a roadmap.</div></div>
  <div class="main" id="main">
    <div id="canvas"><div class="empty">Select or create a roadmap.</div></div>
    <div id="detail-area"></div>
  </div>
</div>

<!-- Tooltip -->
<div class="tt" id="tt"></div>

<div class="toast" id="toast"></div>
<canvas id="export-canvas" style="display:none"></canvas>
<div id="mc"></div>
<input type="file" id="file-inp" accept=".json" style="display:none" onchange="onImport(event)">

<script>
const TYPES=[
  {id:'design',    label:'Product Design',       color:'#1A1A1A',tc:'#fff'},
  {id:'dev',       label:'Development',           color:'#1A7A4A',tc:'#fff'},
  {id:'considering',label:'Being Considered',     color:'#E0E0E0',tc:'#333'},
  {id:'biz',       label:'Business / GTM',        color:'#558B2F',tc:'#fff'},
  {id:'thirdparty',label:'3rd Party Integration', color:'#1B4F8A',tc:'#fff'},
  {id:'marketing', label:'Marketing',             color:'#B45309',tc:'#fff'},
  {id:'blocked',   label:'Blocked',               color:'#C62828',tc:'#fff'},
  {id:'research',  label:'Research',              color:'#6A1B9A',tc:'#fff'},
];
const TM=Object.fromEntries(TYPES.map(t=>[t.id,t]));

const STATUSES=[
  {id:'',          label:'No Status'},
  {id:'inprogress',label:'In Progress',color:'#F59E0B',dot:'#F59E0B'},
  {id:'blocked',   label:'Blocked',    color:'#C62828',dot:'#C62828'},
  {id:'done',      label:'Done',       color:'#1A7A4A',dot:'#1A7A4A'},
];
const SM=Object.fromEntries(STATUSES.map(s=>[s.id,s]));

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QC=['#1B4F8A','#1B4F8A','#1B4F8A','#B45309','#B45309','#B45309','#1A7A4A','#1A7A4A','#1A7A4A','#6A1B9A','#6A1B9A','#6A1B9A'];

// Avatar colour palette
const AVATAR_COLORS=['#1B4F8A','#1A7A4A','#B45309','#6A1B9A','#C62828','#0F6E56','#185FA5','#3B6D11'];
function avatarColor(name){let h=0;for(let c of(name||''))h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function initials(name){if(!name)return '?';const p=name.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();}
// Parse assignees: handles legacy string OR new comma-separated string
function parseAssignees(val){
  if(!val)return [];
  if(Array.isArray(val))return val.filter(Boolean);
  return val.split(',').map(s=>s.trim()).filter(Boolean);
}

let state={roadmaps:{},activeId:null,view:'q',selectedPill:null};

function genId(){return 'rm_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function buildDefaultMonths(){const yr=new Date().getFullYear();return Array.from({length:12},(_,i)=>({label:MONTHS[i]+' '+yr,color:QC[i],year:yr,month:i}));}
function fmtDate(d){return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}
function isoToDisp(s){if(!s)return '';try{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return s}}
function dateToYM(s){if(!s)return null;const d=new Date(s+'T00:00:00');if(isNaN(d))return null;return{y:d.getFullYear(),m:d.getMonth()}}
function dateToQ(s){const ym=dateToYM(s);if(!ym)return null;return Math.floor(ym.m/3)}

function defRm(name){
  return {name,meta:{subtitle:'',version:fmtDate(new Date()),author:'',approved:'TBD',footnote:'Timelines are rough targets. All matters are subject to discussion.'},
    quarters:[{label:'Q1 · 2026',color:'#2C5282'},{label:'Q2 · 2026',color:'#744210'},{label:'Q3 · 2026',color:'#276749'},{label:'Q4 · 2026',color:'#553C9A'}],
    months:buildDefaultMonths(),lanes:[]};
}

// Seed with assignees & blockers
const SEED={};

var _saveTimer=null;
function save(){
  if(!window._fbDB||!window._currentUser)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    window._ownSaveCount=(window._ownSaveCount||0)+1;
    var rmName=state.activeId?(state.roadmaps[state.activeId]?.name||''):'';
    window._fbDB.ref('roadmaps').set(state.roadmaps).catch(function(e){
      console.error('Firebase save error:',e);
      toast('Save failed — check your connection','#C62828');
    });
    logAct('save',rmName);
  },600);
}
function _markDirty(){
  renderCanvas();
}
function _doSave(){
  if(!window._fbDB||!window._currentUser){toast('Not connected','#C62828');return;}
  window._ownSaveCount=(window._ownSaveCount||0)+1;
  var rmName=state.activeId?(state.roadmaps[state.activeId]?.name||''):'';
  window._fbDB.ref('roadmaps').set(state.roadmaps).then(function(){
    window._isDirty=false;
    var ind=document.getElementById('dirty-ind');
    if(ind)ind.style.display='none';
    toast('Saved ✓','#1A7A4A');
    logAct('save',rmName);
  }).catch(function(e){
    toast('Save failed: '+e.message,'#C62828');
  });
}
function _doCancel(){
  if(window._isDirty&&!confirm('Discard unsaved changes?'))return;
  window._isDirty=false;
  var ind=document.getElementById('dirty-ind');
  if(ind)ind.style.display='none';
  // Reload from Firebase
  if(window._fbDB){
    window._fbDB.ref('roadmaps').once('value').then(function(snap){
      state.roadmaps=snap.exists()?snap.val():{};
      renderSelect();
      var ids=Object.keys(state.roadmaps);
      if(ids.length>0)switchRoadmap(ids[0]);
      toast('Changes discarded','#888');
    });
  }
}
function init(){
  if(window._initDone)return; // prevent duplicate listener attachment
  window._initDone=true;
  // Called after auth — load from Firebase
  window._fbDB.ref('roadmaps').once('value').then(function(snap){
    state.roadmaps=snap.exists()?snap.val():{};
    // Firebase converts [] to null — normalize all arrays
    Object.values(state.roadmaps).forEach(function(rm){
      if(!rm.lanes||!Array.isArray(rm.lanes))rm.lanes=[];
      rm.lanes.forEach(function(lane){
        if(!lane.pills||!Array.isArray(lane.pills))lane.pills=[];
        lane.pills.forEach(function(p){
          if(!p.blockers||!Array.isArray(p.blockers))p.blockers=[];
          if(!p.quarters||!Array.isArray(p.quarters)){}
        });
      });
      if(!rm.quarters||!Array.isArray(rm.quarters))rm.quarters=[
        {label:'Q1 · 2026',color:'#2C5282'},{label:'Q2 · 2026',color:'#744210'},
        {label:'Q3 · 2026',color:'#276749'},{label:'Q4 · 2026',color:'#553C9A'}];
      if(!rm.months||!Array.isArray(rm.months))rm.months=buildDefaultMonths();
    });
    renderSelect();
    var ids=Object.keys(state.roadmaps);
    if(ids.length>0){switchRoadmap(ids[0]);}
    else{
      document.getElementById('sidebar').innerHTML='<div class="empty" style="padding:30px 16px;text-align:center;color:#888;font-size:13px">No roadmaps yet.<br><br>Click <strong>+ New</strong> to create your first roadmap.</div>';
      document.getElementById('canvas').innerHTML='<div class="empty" style="padding:60px 20px;text-align:center;color:#888;font-size:14px">No roadmaps yet — click <strong>+ New</strong> in the top bar to get started.</div>';
    }
    // Live sync
    var isFirst=true;
    window._ownSaveCount=0;
    window._fbDB.ref('roadmaps').on('value',function(s){
      if(isFirst){isFirst=false;return;}
      if(window._ownSaveCount>0){window._ownSaveCount--;return;}
      var prevId=state.activeId;
      state.roadmaps=s.exists()?s.val():{};
      renderSelect();
      if(prevId&&state.roadmaps[prevId])switchRoadmap(prevId);
      else{var ids2=Object.keys(state.roadmaps);if(ids2.length>0)switchRoadmap(ids2[0]);}
      toast('Roadmap updated by a team member','#1B4F8A');
    });
    // Activity log
    window._fbDB.ref('activity').on('value',function(s){
      if(!s.exists()){renderActLog([]);return;}
      var entries=Object.values(s.val()).sort(function(a,b){return b.ts-a.ts;}).slice(0,50);
      renderActLog(entries);
    });
  }).catch(function(e){
    console.error('DB load error:',e);
    var el=document.getElementById('canvas');
    if(el)el.innerHTML='<div class="empty" style="padding:60px 20px;text-align:center;color:#C62828;font-size:13px">Failed to load roadmaps. Please refresh the page.</div>';
  });
}

function toast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'#1A7A4A';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function renderSelect(){
  const sel=document.getElementById('rm-sel');sel.innerHTML='';
  Object.entries(state.roadmaps).forEach(([id,rm])=>{const o=document.createElement('option');o.value=id;o.textContent=rm.name;if(id===state.activeId)o.selected=true;sel.appendChild(o);});

var _collapsed={};
function _loadCollapsed(){
  try{var s=sessionStorage.getItem('sootchy_collapsed');if(s)_collapsed=JSON.parse(s);}catch(e){}
}
function _saveCollapsed(){
  try{sessionStorage.setItem('sootchy_collapsed',JSON.stringify(_collapsed));}catch(e){}

function _toggleSection(key){
  _collapsed[key]=!_collapsed[key];
  _saveCollapsed();
  renderSidebar();
}
function _isCollapsed(key){return !!_collapsed[key];}
// Load on startup
_loadCollapsed();

/* ── PER-ITEM DRAFT SYSTEM ── */
var _itemDrafts={}; // key: "li-pi", value: draft pill object

function _draftKey(li,pi){return li+'-'+pi;}

function _getDraft(li,pi){
  var key=_draftKey(li,pi);
  if(!_itemDrafts[key]){
    // Initialize draft from current state
    var rm=state.roadmaps[state.activeId];
    if(rm&&rm.lanes&&rm.lanes[li]&&rm.lanes[li].pills&&rm.lanes[li].pills[pi]){
      _itemDrafts[key]=JSON.parse(JSON.stringify(rm.lanes[li].pills[pi]));
    }
  }
  return _itemDrafts[key];
}

function _setDraftField(li,pi,field,val){
  var draft=_getDraft(li,pi);
  if(draft)draft[field]=val;
  // No canvas re-render until user clicks Save
}

function _saveItem(li,pi){
  var key=_draftKey(li,pi);
  var draft=_itemDrafts[key];
  if(!draft)return;
  var rm=state.roadmaps[state.activeId];
  if(!rm||!rm.lanes||!rm.lanes[li]||!rm.lanes[li].pills)return;
  // Commit draft to state
  rm.lanes[li].pills[pi]=JSON.parse(JSON.stringify(draft));
  delete _itemDrafts[key];
  save();
  renderSidebar();
  toast('Item saved','#1A7A4A');
}

function _cancelItem(li,pi){
  var key=_draftKey(li,pi);
  delete _itemDrafts[key];
  // Clear sidebar first to prevent browser caching old input values
  var sb=document.getElementById('sidebar');
  if(sb)sb.innerHTML='';
  renderSidebar();
  renderCanvas();
}

function _setDraftBlocker(li,pi,bi,val){
  var draft=_getDraft(li,pi);
  if(draft){
    if(!draft.blockers)draft.blockers=[];
    draft.blockers[bi]=val;
  }
}
function _addDraftBlocker(li,pi){
  var draft=_getDraft(li,pi);
  if(draft){if(!draft.blockers)draft.blockers=[];draft.blockers.push('');}
  renderSidebar();
}
function _delDraftBlocker(li,pi,bi){
  var draft=_getDraft(li,pi);
  if(draft&&draft.blockers)draft.blockers.splice(bi,1);
  renderSidebar();
}
function _clearDraftsForRoadmap(){
  _itemDrafts={};
}

/* ── CANVAS ── */
function renderCanvas(){
  const rm=state.roadmaps[state.activeId];
  if(!rm){document.getElementById('canvas').innerHTML='<div class="empty">Select or create a roadmap.</div>';return;}
  state.view==='m'?renderMonthly(rm):renderQuarterly(rm);
}

function pillHTML(p,maxW,li,pi){
  // Use draft if exists (shows preview of unsaved edits on canvas)
  const dp=_itemDrafts&&_itemDrafts[_draftKey(li,pi)];
  if(dp)p=dp;
  const t=TM[p.type]||{color:'#888',tc:'#fff'};
  const s=SM[p.status||''];
  const isSelected=state.selectedPill&&state.selectedPill.li===li&&state.selectedPill.pi===pi;
  const outline=isSelected?`;box-shadow:0 0 0 2.5px #fff,0 0 0 4px ${t.color}`:'';
  const narrow=maxW<90;
  const dateStr=(p.startDate||p.endDate)?`${isoToDisp(p.startDate)}${p.endDate?' → '+isoToDisp(p.endDate):''}`:null;
  const hasDot=s&&s.dot;
  const assignees=parseAssignees(p.assignee);
  const hasAvatar=assignees.length>0;
  const statusLabels={inprogress:'IN PROGRESS',blocked:'BLOCKED',done:'DONE'};
  const sbLabel=statusLabels[p.status||''];
  const ttAssignees=assignees.join(', ');
  const ttData=`data-tt="${esc(p.label)}|${esc(ttAssignees)}|${esc(dateStr||'')}|${esc(p.status||'')}|${(p.blockers||[]).length}"`;
  const avatarStack=(list,tc)=>{
    const show=list.slice(0,3);
    let av=show.map(n=>`<span class="pill-avatar" style="background:rgba(255,255,255,.28);color:${tc};margin-left:-3px;first-child:margin-left:0">${initials(n)}</span>`).join('');
    if(list.length>3)av+=`<span class="pill-avatar" style="background:rgba(0,0,0,.2);color:${tc};margin-left:-3px">+${list.length-3}</span>`;
    return av;
  };
  let inner='';
  if(!narrow){
    inner+=`<span class="pill-label">${esc(p.label)}</span>`;
    if(sbLabel&&maxW>130)inner+=`<span class="sbadge" style="background:rgba(0,0,0,.2);color:${t.tc}">${sbLabel}</span>`;
    if(hasDot)inner+=`<span class="s-dot" style="background:${s.dot}"></span>`;
    if(hasAvatar&&maxW>100)inner+=`<span style="display:inline-flex;margin-left:2px">${avatarStack(assignees,t.tc)}</span>`;
  }else{
    if(hasAvatar)inner+=`<span style="display:inline-flex;width:100%;justify-content:center">${avatarStack(assignees,t.tc)}</span>`;
    else if(hasDot)inner+=`<span class="s-dot" style="background:${s.dot};margin:auto"></span>`;
  }
    const doneStyle=p.status==='done'?';opacity:0.5;filter:grayscale(35%)':'';
  return `<div class="pill-wrap" style="cursor:pointer;width:${maxW}px;max-width:${maxW}px${doneStyle}" ${ttData}
      onmouseenter="showTT(event,this)" onmouseleave="hideTT()" onclick="selectPill(${li},${pi})">
    <div class="pill" style="background:${t.color};color:${t.tc};width:100%;pointer-events:none${outline}">
      ${inner}
    </div>
    ${!narrow&&dateStr?`<div class="pill-dates" style="pointer-events:none">${esc(dateStr)}</div>`:''}
  </div>`;
}

function renderQuarterly(rm){
  const cols=rm.quarters;const nc=cols.length;
  const CW=180,LW=165;
  let h=canvasHdr(rm)+legendHTML();
  const todayX=LW+1.3*CW;
  h+=`<div class="grid-wrap"><div class="grid-scroll"><div style="position:relative;min-width:${LW+CW*nc}px">
    <div class="today-line" style="left:${todayX}px" data-l="▼ Today"></div>
    <div class="grid" style="grid-template-columns:${LW}px repeat(${nc},${CW}px)">
      <div class="qh-spacer"></div>`;
  cols.forEach(c=>h+=`<div class="qh-cell" style="background:${c.color}">${esc(c.label)}</div>`);
  (rm.lanes||[]).forEach((lane,li)=>{
    const cm={};for(let c=0;c<nc;c++)cm[c]=[];
    (lane.pills||[]).forEach((origP,pi)=>{
      var p=_getDraft(li,pi)||origP;
      let col=p.col||0;
      if(p.startDate){const q=dateToQ(p.startDate);if(q!==null&&q<nc)col=q;}
      cm[Math.min(Math.max(col,0),nc-1)].push({p,pi});
    });
    const par=li%2===0?'re':'ro';
    h+=`<div class="ll-cell ${par}"><span class="ll-name">${esc(lane.name)}</span><span class="ll-desc">${esc(lane.desc||'')}</span></div>`;
    for(let c=0;c<nc;c++){
      h+=`<div class="dc-cell ${par}">`;
      cm[c].forEach(({p,pi})=>h+=pillHTML(p,CW-10,li,pi));
      h+=`</div>`;
    }
  });
  h+=`</div></div></div></div>`;
  h+=`<p class="footnote"><em>${esc(rm.meta.footnote)}</em></p>`;
  document.getElementById('canvas').innerHTML=h;
}

function renderMonthly(rm){
  const cols=rm.months;const nc=cols.length;
  const CW=120,LW=165;
  let h=canvasHdr(rm)+legendHTML();
  const now=new Date();
  const todayIdx=cols.findIndex(c=>c.year===now.getFullYear()&&c.month===now.getMonth());
  const todayX=todayIdx>=0?LW+(todayIdx+(now.getDate()-1)/30)*CW:LW;
  h+=`<div class="grid-wrap"><div class="grid-scroll"><div style="position:relative;min-width:${LW+CW*nc}px">
    <div class="today-line" style="left:${todayX}px" data-l="▼ Today"></div>
    <div class="grid" style="grid-template-columns:${LW}px repeat(${nc},${CW}px)">
      <div class="qh-spacer"></div>`;
  cols.forEach(c=>h+=`<div class="qh-cell" style="background:${c.color};font-size:11px">${esc(c.label)}</div>`);

  (rm.lanes||[]).forEach((lane,li)=>{
    const par=li%2===0?'re':'ro';
    // Build per-cell: items that START in each column
    const cellItems=Array.from({length:nc},()=>[]);
    (lane.pills||[]).forEach((origP,pi)=>{
      var p=_getDraft(li,pi)||origP;
      const start=dateToYM(p.startDate);
      const end=dateToYM(p.endDate);
      let startIdx=-1,endIdx=-1;
      if(start){cols.forEach((c,ci)=>{if(c.year===start.y&&c.month===start.m)startIdx=ci;});}
      if(end){cols.forEach((c,ci)=>{if(c.year===end.y&&c.month===end.m)endIdx=ci;});}
      if(startIdx===-1)startIdx=Math.min(Math.max(p.col||0,0),nc-1);
      if(endIdx<startIdx)endIdx=startIdx;
      endIdx=Math.min(endIdx,nc-1);
      cellItems[startIdx].push({p,pi,span:endIdx-startIdx+1});
    });

    h+=`<div class="ll-cell ${par}"><span class="ll-name">${esc(lane.name)}</span><span class="ll-desc">${esc(lane.desc||'')}</span></div>`;
    for(let c=0;c<nc;c++){
      h+=`<div class="dc-cell ${par}" style="overflow:visible">`;
      cellItems[c].forEach(({p,pi,span})=>{
        const pillW=CW*span-10;
        h+=pillHTML(p,pillW,li,pi);
      });
      h+=`</div>`;
    }
  });
  h+=`</div></div></div></div>`;
  h+=`<p class="footnote"><em>${esc(rm.meta.footnote)}</em></p>`;
  document.getElementById('canvas').innerHTML=h;
}

function canvasHdr(rm){

function showTT(e,el){
  const raw=el.getAttribute('data-tt');if(!raw)return;
  const[label,assignee,dates,status,blockerCount]=raw.split('|');
  const statusLabels={inprogress:'In Progress',blocked:'Blocked',done:'Done'};
  const s=SM[status||''];
  let h=`<div class="tt-title">${esc(label)}</div>`;
  if(assignee)h+=`<div class="tt-row"><strong>Assignee:</strong> ${esc(assignee)}</div>`;
  if(dates)h+=`<div class="tt-row"><strong>Duration:</strong> ${esc(dates)}</div>`;
  if(status)h+=`<div class="tt-row"><strong>Status:</strong> <span style="color:${s?s.dot:'#fff'}">${esc(statusLabels[status]||status)}</span></div>`;
  if(parseInt(blockerCount)>0)h+=`<div class="tt-row" style="color:#ffaaaa"><strong>${blockerCount} blocker${blockerCount>1?'s':''}</strong> — click to view</div>`;
  const tt=document.getElementById('tt');
  tt.innerHTML=h;tt.classList.add('show');
  positionTT(e);
}
function positionTT(e){
  const tt=document.getElementById('tt');
  let x=e.clientX+14,y=e.clientY-10;
  if(x+250>window.innerWidth)x=e.clientX-260;
  if(y+120>window.innerHeight)y=window.innerHeight-130;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function hideTT(){document.getElementById('tt').classList.remove('show');}
document.addEventListener('mousemove',e=>{const tt=document.getElementById('tt');if(tt.classList.contains('show'))positionTT(e);});

function onImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);const count=Object.keys(data).length;
      if(!count)throw new Error();
      if(!confirm(`Import ${count} roadmap(s)? Will merge with existing.`))return;
      Object.assign(state.roadmaps,data);save();renderSelect();
      const ids=Object.keys(state.roadmaps);if(ids.length)switchRoadmap(ids[0]);
      toast(`Imported ${count} roadmap(s)`);
    }catch{alert('Invalid file.');}
  };
  r.readAsText(file);e.target.value='';
}

function downloadSVG(){
  document.getElementById('dl-menu').style.display='none';
  // Build a simple SVG representation of the current roadmap grid
  const rm=state.roadmaps[state.activeId];if(!rm){toast('No roadmap selected','#C62828');return;}
  const cols=state.view==='m'?rm.months:rm.quarters;
  const nc=cols.length;
  const CW=180,LW=170,ROW_H=54,HEAD_H=40,PAD=20;
  const W=LW+CW*nc+PAD*2;
  const H=HEAD_H+(rm.lanes.length*ROW_H)+PAD*2+60;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" font-family="Arial,sans-serif">`;
  svg+=`<rect width="${W}" height="${H}" fill="#F0F2F5"/>`;
  // Title
  svg+=`<text x="${PAD}" y="${PAD+18}" font-size="18" font-weight="bold" fill="#1B4F8A">${esc(rm.name)}</text>`;
  svg+=`<text x="${PAD}" y="${PAD+34}" font-size="11" fill="#555">${esc(rm.meta.subtitle)}</text>`;
  const gridY=PAD+50;
  // Header cells
  svg+=`<rect x="${PAD}" y="${gridY}" width="${LW}" height="${HEAD_H}" fill="#FAFBFC" stroke="#DDE2EA" stroke-width="0.5"/>`;
  cols.forEach((c,i)=>{
    const x=PAD+LW+i*CW;
    svg+=`<rect x="${x}" y="${gridY}" width="${CW}" height="${HEAD_H}" fill="${c.color}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>`;
    svg+=`<text x="${x+CW/2}" y="${gridY+HEAD_H/2+4}" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">${esc(c.label)}</text>`;
  });
  // Lane rows
  (rm.lanes||[]).forEach((lane,li)=>{
    const y=gridY+HEAD_H+li*ROW_H;
    const rowFill=li%2===0?'#fff':'#F6F8FB';
    // Lane label cell
    svg+=`<rect x="${PAD}" y="${y}" width="${LW}" height="${ROW_H}" fill="${rowFill}" stroke="#DDE2EA" stroke-width="0.5"/>`;
    svg+=`<text x="${PAD+10}" y="${y+16}" font-size="11" font-weight="bold" fill="#1A1A1A">${esc(lane.name)}</text>`;
    svg+=`<text x="${PAD+10}" y="${y+28}" font-size="9" fill="#888">${esc(lane.desc||'')} </text>`;
    // Data cells + pills
    for(let c=0;c<nc;c++){
      const cx=PAD+LW+c*CW;
      svg+=`<rect x="${cx}" y="${y}" width="${CW}" height="${ROW_H}" fill="${rowFill}" stroke="#DDE2EA" stroke-width="0.5"/>`;
    }
    (lane.pills||[]).forEach(p=>{
      let col=p.col||0;
      if(p.startDate&&state.view==='q'){const q=dateToQ(p.startDate);if(q!==null&&q<nc)col=q;}
      col=Math.min(Math.max(col,0),nc-1);
      const t=TM[p.type]||{color:'#888'};
      const px=PAD+LW+col*CW+4;const py=y+6;
      const pw=CW*(p.span||1)-8;const ph=22;
      svg+=`<rect x="${px}" y="${py}" width="${pw}" height="${ph}" rx="10" fill="${t.color}"/>`;
      const maxChars=Math.floor(pw/6.5);
      const lbl=p.label.length>maxChars?p.label.slice(0,maxChars-1)+'…':p.label;
      svg+=`<text x="${px+8}" y="${py+15}" font-size="10" font-weight="600" fill="${t.tc||'#fff'}">${esc(lbl)}</text>`;
    });
  });
  // Footer
  svg+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#aaa" font-style="italic">${esc(rm.meta.footnote)}</text>`;
  svg+='</svg>';
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const name=(rm.name||'roadmap').replace(/\s+/g,'_');
  a.download='sootchy_roadmap_'+name+'_'+new Date().toISOString().slice(0,10)+'.svg';
  a.click();toast('SVG downloaded');
}

function avColor(n){var h=0;for(var i=0;i<(n||'').length;i++)h=(h*31+n.charCodeAt(i))%AVCOLS.length;return AVCOLS[h];}
function avInitials(n){if(!n)return '?';var p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}

  var colors={save:'#1A7A4A',create:'#1B4F8A',delete:'#C62828',import:'#B45309'};
  var labels={save:'saved',create:'created',delete:'deleted',import:'imported'};
  if(!_actEntries||!_actEntries.length){
    container.innerHTML='<div style="padding:24px;text-align:center;font-size:12px;color:#888;font-style:italic">No activity yet.</div>';
    return;
  }
  var h='';
  _actEntries.forEach(function(e){
    var when=new Date(e.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    var col=colors[e.action]||'#888';
    var lbl=labels[e.action]||e.action;
    h+='<div class="act-item"><div class="act-dot" style="background:'+col+'"></div><div class="act-body"><span class="act-who">'+esc(e.who)+'</span> <span class="act-what">'+lbl+' '+(e.roadmap?'<strong>'+esc(e.roadmap)+'</strong>':'')+'</span><div class="act-when">'+when+'</div></div></div>';
  });
  container.innerHTML=h;
}
function openLogs(){
  var modal=document.getElementById('logs-modal-bg');
  var body=document.getElementById('logs-modal-body');
  if(!modal||!body)return;
  modal.style.display='flex';
  // Show loading state
  body.innerHTML='<div style="padding:24px;text-align:center;font-size:12px;color:#888">Loading...</div>';
  // Fresh read from Firebase
  if(window._fbDB){
    window._fbDB.ref('activity').once('value').then(function(s){
      if(!s.exists()){renderActLog([]);return;}
      var entries=Object.values(s.val()).sort(function(a,b){return b.ts-a.ts;}).slice(0,100);
      renderActLog(entries);
    }).catch(function(){
      _renderActBody(body); // fall back to cached entries
    });
  } else {
    _renderActBody(body);
  }
}
function closeLogs(){
  var modal=document.getElementById('logs-modal-bg');
  if(modal)modal.style.display='none';
}

/* ── AUTH FUNCTIONS (called from onclick — must be global) ── */
function authSignIn(){
  var btn=document.getElementById('auth-btn');
  var msg=document.getElementById('auth-msg');
  var err=document.getElementById('auth-err');
  btn.disabled=true;
  btn.style.opacity='0.6';
  msg.style.display='block';msg.textContent='Opening Google sign-in...';
  err.style.display='none';
  // Defensive checks before calling Firebase
  if(typeof firebase==='undefined'){
    btn.disabled=false;btn.style.opacity='1';msg.style.display='none';
    err.style.display='block';err.textContent='Firebase failed to load. Please refresh the page.';
    return;
  }
  if(typeof firebase.auth!=='function'){
    btn.disabled=false;btn.style.opacity='1';msg.style.display='none';
    err.style.display='block';err.textContent='Firebase Auth not ready. Please refresh the page.';
    return;
  }
  var provider;
  try{ provider=new firebase.auth.GoogleAuthProvider(); }
  catch(e){
    btn.disabled=false;btn.style.opacity='1';msg.style.display='none';
    err.style.display='block';err.textContent='Auth error: '+e.message;
    return;
  }
  firebase.auth().signInWithPopup(provider).then(function(result){
    var email=(result.user.email||'').toLowerCase();
    if(!email.endsWith('@sootchy.com')){
      return firebase.auth().signOut().then(function(){
        btn.disabled=false;
        msg.style.display='none';
        err.style.display='block';
        err.textContent='Access denied: '+result.user.email+' is not a @sootchy.com account.';
      });
    }
    // success — onAuthStateChanged handles the rest
  }).catch(function(e){
    btn.disabled=false;
    btn.style.opacity='1';
    msg.style.display='none';
    var silentCodes=['auth/popup-closed-by-user','auth/cancelled-popup-request'];
    if(silentCodes.indexOf(e.code)>-1){
      // User closed popup — no error needed, just re-enable button
      return;
    }
    err.style.display='block';
    if(e.code==='auth/popup-blocked'){
      err.textContent='Popup was blocked by your browser. Please allow popups for this site and try again.';
    } else if(e.code==='auth/network-request-failed'){
      err.textContent='Network error. Please check your connection and try again.';
    } else {
      err.textContent='Sign-in failed: '+(e.code||e.message||'Unknown error');
    }
  });
}
function authSignOut(){
  if(!confirm('Sign out?'))return;
  firebase.auth().signOut();
}
